services:
  # Postgres — base de données unique du stack (Drizzle pg + RLS). MySQL (legacy) a été retiré :
  # la migration est complète, le backend tourne sur le nouveau stack Fastify (cf. extinction du
  # legacy). Le port hôte 5432 est aussi celui du PG jetable utilisé par le gate (tsc/vitest).
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: artisan_mvp
      POSTGRES_USER: ${POSTGRES_USER:-artisan_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-artisan_password}
    ports:
      - "5432:5432"
    volumes:
      # PG18+ : monter /var/lib/postgresql (données dans un sous-dossier par version),
      # PAS /var/lib/postgresql/data (cf. docker-library/postgres#1259).
      - pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-artisan_user} -d artisan_mvp"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # Backend de dev = nouveau stack Fastify (`pnpm dev` = tsx watch src/server.ts). drizzle-kit migrate
  # tourne en owner (DATABASE_URL → artisan_user) ; le runtime new-stack utilise APP_DATABASE_URL
  # (rôle non-superuser app_tenant, soumis RLS — comme en staging). ⚠️ Le rôle app_tenant + les
  # policies RLS doivent être provisionnés une fois (scripts/rls/setup-app-role.mjs, PG_URL=owner).
  app:
    image: node:22-slim
    working_dir: /app
    restart: unless-stopped
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DB_DIALECT: postgresql
      NEW_STACK_PORT: "3000"
      HOST: 0.0.0.0
      # migrate (DDL) = owner ; runtime new-stack (RLS) = app_tenant.
      DATABASE_URL: postgres://${POSTGRES_USER:-artisan_user}:${POSTGRES_PASSWORD:-artisan_password}@postgres:5432/artisan_mvp
      APP_DATABASE_URL: postgres://app_tenant:app_tenant_pw@postgres:5432/artisan_mvp
    env_file:
      - .env.local
    command: >
      sh -c "npm install -g pnpm@10.4.1 --silent &&
             pnpm install --frozen-lockfile &&
             pnpm exec drizzle-kit migrate &&
             pnpm dev"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:
  app_node_modules:
