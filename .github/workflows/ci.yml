# CI de la refonte clean-archi (nouveau stack src/**).
# - Job `tsc-and-unit` (BLOQUANT) : type-check + suite Vitest. Sans DATABASE_URL, les tests PG
#   (RLS/e2e) se skippent proprement (describe.skipIf(!URL)) → exécute tsc + ~930 tests purs.
# - Job `e2e-postgres` (NON bloquant pour l'instant) : provisionne Postgres + schéma PG + policies
#   RLS + rôle non-superuser `app_tenant`, puis lance la suite COMPLÈTE (≈+511 tests d'isolation/e2e
#   qui se skippent dans le job ci-dessus). Passer `continue-on-error: false` une fois le bootstrap
#   confirmé vert en CI.
name: CI

on:
  push:
    branches: [staging, main]
  pull_request:

jobs:
  tsc-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Type-check (nouveau stack)
        run: pnpm exec tsc -p tsconfig.src.json
      - name: Tests (PG skippés sans DATABASE_URL)
        run: pnpm exec vitest run src

  e2e-postgres:
    runs-on: ubuntu-latest
    # Tant que le bootstrap PG n'est pas validé en CI, ce job informe sans bloquer la CI.
    continue-on-error: true
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: artisan_user
          POSTGRES_PASSWORD: artisan_password
          POSTGRES_DB: artisan_mvp
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U artisan_user -d artisan_mvp"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://artisan_user:artisan_password@localhost:5432/artisan_mvp
      DB_DIALECT: postgresql
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # 1. Schéma PG (génère + applique les migrations dans drizzle/pg).
      - name: Schéma PostgreSQL
        run: pnpm db:push
      # 2. Policies RLS (idempotent — ENABLE/FORCE + tenant_isolation par table tenant).
      - name: Policies RLS
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f drizzle/rls/tenant-isolation.sql
      # 3. Rôle applicatif non-superuser `app_tenant` (les tests dérivent APP_DATABASE_URL vers ce rôle).
      - name: Rôle app_tenant
        run: node scripts/rls/setup-app-role.mjs
      # 4. Suite complète sous RLS (les e2e/isolation tournent pour de vrai).
      - name: Suite complète (sous RLS)
        run: pnpm exec vitest run src
