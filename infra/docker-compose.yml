# Staging stack — isolated from dev (separate project, DB volume, network).
# Runs the PRODUCTION build (pnpm build + pnpm start), public via the
# artisan-staging Cloudflare tunnel (NO Cloudflare Access).
#
# Usage (from the staging worktree, see Taskfile `staging:*`):
#   docker compose --env-file .env.staging up -d
name: artisan-staging

services:
  # Postgres — base de données unique du stack (Drizzle pg + RLS). MySQL (legacy) et le
  # service `app` (backend Express legacy) ont été retirés : la migration est complète, le
  # trafic est 100 % new-stack (dispatcher mono-stack, `functions/_lib/dispatch.mjs`).
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: artisan_mvp
      POSTGRES_USER: ${POSTGRES_USER:-artisan_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-artisan_password}
    ports:
      # Port hôte différent du dev (5432) pour debug.
      - "5433:5432"
    volumes:
      - postgres_staging_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-artisan_user} -d artisan_mvp"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # Slot blue — slot par défaut au démarrage. Géré par deploy-backend.sh (blue-green).
  new-stack-blue:
    image: operioz-newstack:latest
    build:
      context: ..
      dockerfile: infra/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEW_STACK_PORT: "3001"
      HOST: 0.0.0.0
      # OWNER (artisan_user) : provision au boot (migrations schéma + RLS, création/grants du rôle app). Éphémère.
      DATABASE_URL: postgres://artisan_user:${POSTGRES_PASSWORD:-artisan_password}@postgres:5432/artisan_mvp
      # APP (app_tenant) non-superuser → soumis aux policies RLS. Sert toutes les requêtes (long-lived).
      APP_DATABASE_URL: postgres://app_tenant:${APP_DB_PASSWORD:-app_tenant_pw}@postgres:5432/artisan_mvp
      BETTERSTACK_TOKEN: ${BETTERSTACK_TOKEN:-}
    # JWT_SECRET (mêmes cookies que le legacy) + autres secrets via .env.staging.
    env_file:
      - ../.env.staging
    ports:
      - "3011:3001"
    depends_on:
      postgres:
        condition: service_healthy

  # Slot green — démarré uniquement par deploy-backend.sh lors d'un déploiement.
  new-stack-green:
    image: operioz-newstack:latest
    build:
      context: ..
      dockerfile: infra/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEW_STACK_PORT: "3001"
      HOST: 0.0.0.0
      DATABASE_URL: postgres://artisan_user:${POSTGRES_PASSWORD:-artisan_password}@postgres:5432/artisan_mvp
      APP_DATABASE_URL: postgres://app_tenant:${APP_DB_PASSWORD:-app_tenant_pw}@postgres:5432/artisan_mvp
      BETTERSTACK_TOKEN: ${BETTERSTACK_TOKEN:-}
    env_file:
      - ../.env.staging
    ports:
      - "3012:3001"
    depends_on:
      postgres:
        condition: service_healthy

  # Proxy nginx — point d'entrée unique sur 3010. Route vers le slot actif (blue|green).
  # L'alias réseau `new-stack` maintient la compatibilité avec le tunnel CF (configuré
  # en Terraform sur http://new-stack:3001) sans modification du dashboard CF.
  proxy:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "3010:3001"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      default:
        aliases:
          - new-stack
    depends_on:
      - new-stack-blue

  prometheus:
    image: prom/prometheus:v2.52.0
    restart: unless-stopped
    volumes:
      - ../scripts/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../scripts/monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - proxy

  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    volumes:
      - ../scripts/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    depends_on:
      - prometheus

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    # Le tunnel CF route staging-backend.operioz.com → http://new-stack:3001 (alias du proxy).
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN_STAGING}
    depends_on:
      - proxy

volumes:
  postgres_staging_data:
  prometheus_data:
