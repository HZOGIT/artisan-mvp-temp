# Staging stack — isolated from dev (separate project, DB volume, network).
# Runs the PRODUCTION build (pnpm build + pnpm start), public via the
# artisan-staging Cloudflare tunnel (NO Cloudflare Access).
#
# Usage (from the staging worktree, see Taskfile `staging:*`):
#   docker compose --env-file .env.staging up -d
name: artisan-staging

services:
  # Postgres — base de données unique du stack (Drizzle pg + RLS). MySQL (legacy) et le
  # service `app` (backend Express legacy) ont été retirés : la migration est complète, le
  # trafic est 100 % new-stack (dispatcher mono-stack, `functions/_lib/dispatch.mjs`).
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: artisan_mvp
      POSTGRES_USER: ${POSTGRES_USER:-artisan_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-artisan_password}
    ports:
      # Port hôte différent du dev (5432) pour debug.
      - "5433:5432"
    volumes:
      - postgres_staging_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-artisan_user} -d artisan_mvp"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # Stack clean-archi (Fastify + tRPC 11 + Drizzle pg) — désormais le SEUL backend.
  # Tourne sous le rôle non-superuser app_tenant (soumis RLS). Le tunnel `cloudflared`
  # le sert directement (le dispatcher edge route tout `/api/*` vers le new-stack).
  # Exposé sur le port hôte 3010 pour smoke-test.
  new-stack:
    image: operioz-newstack:latest
    build:
      context: ..
      dockerfile: infra/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEW_STACK_PORT: "3001"
      HOST: 0.0.0.0
      # OWNER (artisan_user) : provision au boot (migrations schéma + RLS, création/grants du rôle app). Éphémère.
      DATABASE_URL: postgres://artisan_user:${POSTGRES_PASSWORD:-artisan_password}@postgres:5432/artisan_mvp
      # APP (app_tenant) non-superuser → soumis aux policies RLS. Sert toutes les requêtes (long-lived).
      # Source unique du secret app : ensureAppRole provisionne le rôle avec CE user+password.
      APP_DATABASE_URL: postgres://app_tenant:${APP_DB_PASSWORD:-app_tenant_pw}@postgres:5432/artisan_mvp
      BETTERSTACK_TOKEN: ${BETTERSTACK_TOKEN:-}
    # JWT_SECRET (mêmes cookies que le legacy) + autres secrets via .env.staging.
    env_file:
      - ../.env.staging
    ports:
      - "3010:3001"
    depends_on:
      postgres:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.52.0
    restart: unless-stopped
    volumes:
      - ../scripts/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - new-stack

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    # The artisan-staging tunnel routes the new-stack backend hostname -> http://new-stack:3001
    # (configured in Terraform, cloudflare-managed). cloudflared reaches the service by its
    # compose name over the shared network — no host ports. L'ancien ingress vers `app:3000`
    # (backend legacy) est mort (le dispatcher edge ne cible plus que le new-stack) ; son
    # nettoyage Terraform est traité séparément.
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN_STAGING}
    depends_on:
      - new-stack

volumes:
  postgres_staging_data:
  prometheus_data:
