rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]

scrape_configs:
  - job_name: new-stack
    static_configs:
      - targets: ["new-stack:3001"]
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: cloudflare
    static_configs:
      - targets: ["cloudflare-exporter:8080"]
