groups:
  - name: backend
    rules:
      - alert: HighErrorRate
        expr: rate(http_request_duration_seconds_count{status_code=~"5.."}[5m]) / rate(http_request_duration_seconds_count[5m]) > 0.01
        for: 3m
        annotations:
          summary: Taux d erreur 5xx > 1% depuis 3 min

      - alert: HighLatencyP95
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        annotations:
          summary: Latence p95 > 2s

      - alert: HealthCheckFailing
        expr: up{job="new-stack"} == 0
        for: 1m
        annotations:
          summary: Backend new-stack inaccessible depuis 1 min

  - name: email
    rules:
      - alert: EmailBounceRateHigh
        expr: rate(resend_webhook_total{type="email.bounced"}[1h]) / rate(resend_webhook_total{type="email.sent"}[1h]) > 0.05
        for: 30m
        annotations:
          summary: Bounce rate emails > 5% — risque de blacklistage domaine

      - alert: EmailSpamComplaint
        expr: increase(resend_webhook_total{type="email.complained"}[1h]) > 0
        for: 0m
        annotations:
          summary: Plainte spam Resend — action immédiate requise
