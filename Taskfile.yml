version: '3'

vars:
  DOCKER: docker
  COMPOSE: docker compose -f infra/docker-compose.yml
  DB_USER: '{{.POSTGRES_USER | default "artisan_user"}}'
  DB_NAME: artisan_mvp
  # DB locale (PG sur 5432). Les tâches drizzle/seed tournent depuis le HOST (plus de
  # conteneur bind-mount après l'unification du compose) → DATABASE_URL + DB_DIALECT injectés.
  LOCAL_DATABASE_URL: postgres://artisan_user:artisan_password@localhost:5432/artisan_mvp
  # Rôle applicatif (non-superuser, soumis RLS) du même PG de test — creds dérivés de l'owner par
  # `vitest.setup.api.ts` (owner → app_tenant:app_tenant_pw). Sert `task db:provision` (mirroir du boot).
  LOCAL_APP_DATABASE_URL: postgres://app_tenant:app_tenant_pw@localhost:5432/artisan_mvp
  # Consolidé : on développe directement sur la branche `staging` dans ce dépôt
  # (plus de worktree séparé). Le déploiement rebuild le conteneur depuis ce checkout.
  STAGING_DIR: /home/developer/artisan-mvp-temp
  STAGING_COMPOSE: docker compose -f infra/docker-compose.yml --env-file .env.staging

env:
  DOCKER_HOST: unix:///run/user/1001/docker.sock

dotenv:
  - .env
  - .env.local

tasks:
  stack:up:
    desc: Start all stack containers in background
    cmds:
      - '{{.COMPOSE}} up -d'
      - '{{.COMPOSE}} ps'

  stack:down:
    desc: Stop all stack containers
    cmds:
      - '{{.COMPOSE}} down'

  stack:logs:
    desc: Follow stack container logs
    cmds:
      - '{{.COMPOSE}} logs -f'

  stack:logs:app:
    desc: Follow app container logs only
    cmds:
      - '{{.COMPOSE}} logs -f new-stack'

  stack:restart:
    desc: Restart all stack containers
    cmds:
      - '{{.COMPOSE}} restart'

  stack:status:
    desc: Show container status
    cmds:
      - '{{.COMPOSE}} ps'

  # Provision de la base (rôle applicatif + migrations schéma/RLS) = AUTOMATIQUE au boot du serveur
  # (apps/api/shared/db/provision-database.ts). Staging = dev : `task stack:up`/`stack:restart` (re)provisionne.
  db:provision:
    desc: "Applique migrations (schéma + RLS) + (re)assure le rôle app_tenant sur le PG de test (5432). Identique au boot serveur — à lancer quand la BDD de test est en retard de migrations (gate L3)."
    cmds:
      - 'DATABASE_URL={{.LOCAL_DATABASE_URL}} APP_DATABASE_URL={{.LOCAL_APP_DATABASE_URL}} DB_DIALECT=postgresql pnpm exec tsx apps/api/shared/db/provision-cli.ts'

  db:generate:
    desc: Generate a new migration from schema.ts changes (does NOT touch the DB)
    cmds:
      - 'DATABASE_URL={{.LOCAL_DATABASE_URL}} DB_DIALECT=postgresql pnpm exec drizzle-kit generate'

  db:seed:
    desc: Seed user dev@operioz.com / Operioz on the local DB (PostgreSQL, bcrypt)
    cmds:
      - 'DATABASE_URL={{.LOCAL_DATABASE_URL}} DB_DIALECT=postgresql USER_EMAIL=dev@operioz.com USER_PASSWORD=Operioz USER_NAME="Dev Operioz" pnpm exec tsx scripts/create-user.ts'

  db:seed:admin:
    desc: "Crée/promeut un user STAFF PLATEFORME (role=admin, SANS artisan → accès platformAdmin.*). Vars : EMAIL (requis), PASSWORD (défaut Azerqsdf1234!), DB_URL (défaut local 5432 ; passer l'URL du PG staging 5433 pour le backend déployé). Ex : task db:seed:admin EMAIL=dev+admin@operioz.com"
    requires:
      vars: [EMAIL]
    cmds:
      - 'DATABASE_URL="{{.DB_URL | default .LOCAL_DATABASE_URL}}" DB_DIALECT=postgresql USER_ROLE=admin USER_EMAIL="{{.EMAIL}}" USER_PASSWORD="{{.PASSWORD | default "Azerqsdf1234!"}}" USER_NAME="{{.NAME | default "Staff Operioz"}}" pnpm exec tsx scripts/create-user.ts'

  db:seed:show:
    desc: Show seeded users
    cmds:
      - |
        {{.COMPOSE}} exec postgres psql -U {{.DB_USER}} -d {{.DB_NAME}} \
          -c 'SELECT u.id, u.email, u.role, u.actif, a."nomEntreprise" FROM users u LEFT JOIN artisans a ON a."userId" = u.id;'

  db:shell:
    desc: Open PostgreSQL shell
    cmds:
      - '{{.COMPOSE}} exec postgres psql -U {{.DB_USER}} -d {{.DB_NAME}}'

  tf:plan:
    desc: Run terraform plan (with tfsec) — Cloudflare
    dir: infra/terraform
    cmds:
      - ./run.sh plan

  tf:apply:
    desc: Run terraform apply (with tfsec) — Cloudflare
    dir: infra/terraform
    cmds:
      - ./run.sh apply

  gcp:init:
    desc: Init terraform GCP provider
    dir: infra/terraform/gcp
    cmds:
      - terraform init

  gcp:plan:
    desc: Plan GCP infra (Gemini API key)
    dir: infra/terraform/gcp
    cmds:
      - ./run.sh plan

  gcp:apply:
    desc: Apply GCP infra + write GEMINI_API_KEY to .env.local
    dir: infra/terraform/gcp
    cmds:
      - ./run.sh apply

  gcp:key:
    desc: Print current Gemini API key
    dir: infra/terraform/gcp
    cmds:
      - ./run.sh output

  # ─── STAGING (public, prod build) ──────────────────────────────────────────
  # We develop ON the `staging` branch (this working dir is the live working copy).
  # staging.operioz.com is a separate worktree that builds a snapshot of
  # origin/staging, redeployed ONLY on demand (task staging:deploy).
  # The worktree uses a DETACHED checkout so it never conflicts with the
  # `staging` branch checked out here.
  staging:bootstrap:
    desc: "(obsolète) Le worktree séparé a été consolidé — on développe sur `staging` ici."
    cmds:
      - echo "Worktree consolidé. Develop on branch 'staging' in this repo, then 'task staging:deploy'."

  staging:up:
    desc: Start the staging stack (mysql + prod app + cloudflared)
    dir: '{{.STAGING_DIR}}'
    cmds:
      - '{{.STAGING_COMPOSE}} up -d'
      - '{{.STAGING_COMPOSE}} ps'

  staging:deploy:
    desc: Deploy the local `staging` branch to staging.operioz.com (rebuild + restart app)
    dir: '{{.STAGING_DIR}}'
    cmds:
      - '{{.STAGING_COMPOSE}} up -d --build --force-recreate new-stack'
      - '{{.STAGING_COMPOSE}} ps'

  staging:down:
    desc: Stop the staging stack
    dir: '{{.STAGING_DIR}}'
    cmds:
      - '{{.STAGING_COMPOSE}} down'

  staging:logs:
    desc: Follow staging app logs
    dir: '{{.STAGING_DIR}}'
    cmds:
      - '{{.STAGING_COMPOSE}} logs -f new-stack'

  staging:status:
    desc: Show staging container status
    dir: '{{.STAGING_DIR}}'
    cmds:
      - '{{.STAGING_COMPOSE}} ps'

  staging:seed:
    desc: Seed the staging DB with the dev user (dev@operioz.com / Operioz) — PostgreSQL, bcrypt
    dir: '{{.STAGING_DIR}}'
    # Le conteneur new-stack est un bundle prod (sans tsx/source) → on lance le seed depuis l'hôte
    # contre le PG staging (port hôte 5433), credentials chargés depuis .env.staging.
    cmds:
      - |
        set -a; . ./.env.staging; set +a
        DATABASE_URL="postgres://${POSTGRES_USER:-artisan_user}:${POSTGRES_PASSWORD:-artisan_password}@localhost:5433/artisan_mvp" \
          USER_EMAIL=dev@operioz.com USER_PASSWORD=Operioz USER_NAME='Dev Operioz' \
          pnpm exec tsx scripts/create-user.ts

  staging:db:shell:
    desc: Open a PostgreSQL shell on the staging DB
    dir: '{{.STAGING_DIR}}'
    cmds:
      - '{{.STAGING_COMPOSE}} exec postgres psql -U {{.DB_USER}} -d {{.DB_NAME}}'
